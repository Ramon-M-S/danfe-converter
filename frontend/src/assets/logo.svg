<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo com gradiente -->
  <circle cx="100" cy="100" r="90" fill="url(#gradient)"/>
  
  <!-- Documento estilizado -->
  <rect x="60" y="50" width="80" height="100" rx="12" fill="white" fill-opacity="0.15"/>
  <rect x="70" y="60" width="60" height="8" rx="4" fill="white" fill-opacity="0.9"/>
  <rect x="70" y="75" width="60" height="8" rx="4" fill="white" fill-opacity="0.7"/>
  <rect x="70" y="90" width="40" height="8" rx="4" fill="white" fill-opacity="0.5"/>
  <rect x="70" y="115" width="60" height="8" rx="4" fill="white" fill-opacity="0.3"/>
  <rect x="70" y="130" width="60" height="8" rx="4" fill="white" fill-opacity="0.2"/>
  
  <!-- Setas de conversão -->
  <path d="M115 140 L125 150 L115 160" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-opacity="0.8"/>
  <path d="M85 60 L75 50 L85 40" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-opacity="0.8"/>
  
  <!-- Ícone de PDF -->
  <text x="90" y="180" font-family="Arial" font-size="20" font-weight="bold" fill="white" fill-opacity="0.9">PDF</text>
  
  <!-- Gradiente -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4361ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
</svg>
